<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 奶油蜡烛小屋摆件 - 图文介绍图：香型、燃烧时长、使用安全提示图 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffaf0"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">香型、燃烧时长、使用安全提示图</text>
  <!-- 蜡烛图示 -->
  <rect x="40" y="50" width="40" height="50" fill="#fff5e6" stroke="#3d2f3b" stroke-width="2"/>
  <path d="M40 60 L60 40 L80 60 Z" fill="#ffddc1" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 信息卡片 -->
  <rect x="100" y="45" width="120" height="70" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <text x="110" y="65" font-size="10" fill="#666">香型：香草奶油</text>
  <text x="110" y="82" font-size="10" fill="#666">燃烧时长：约 25 小时</text>
  <text x="110" y="99" font-size="10" fill="#666">材质：大豆蜡 + 棉质烛芯</text>
  <!-- 安全提示 -->
  <rect x="20" y="130" width="200" height="35" fill="#fff5e6" stroke="#ff9fbd" stroke-width="2" rx="5"/>
  <text x="30" y="150" font-size="10" fill="#666">使用时请远离易燃物，勿让儿童接触</text>
</svg>