<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 奶油季节礼盒 - 细节图：开盒清单 -->
  <rect x="30" y="40" width="100" height="80" fill="#fff5e6" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 礼盒打开状态 -->
  <rect x="30" y="40" width="100" height="15" fill="#fff5e6" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 丝带 -->
  <path d="M80 40 L80 120" stroke="#ff9fbd" stroke-width="8"/>
  <path d="M40 80 L120 80" stroke="#ff9fbd" stroke-width="8"/>
  <!-- 蝴蝶结 -->
  <circle cx="80" cy="80" r="8" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="1"/>
</svg>