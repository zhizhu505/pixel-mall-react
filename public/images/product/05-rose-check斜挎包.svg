<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 玫瑰粉格纹小包 -->
  <rect x="40" y="50" width="80" height="70" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 格纹装饰 -->
  <line x1="40" y1="65" x2="120" y2="65" stroke="#fffaf0" stroke-width="2"/>
  <line x1="40" y1="80" x2="120" y2="80" stroke="#fffaf0" stroke-width="2"/>
  <line x1="40" y1="95" x2="120" y2="95" stroke="#fffaf0" stroke-width="2"/>
  <line x1="55" y1="50" x2="55" y2="120" stroke="#fffaf0" stroke-width="2"/>
  <line x1="75" y1="50" x2="75" y2="120" stroke="#fffaf0" stroke-width="2"/>
  <line x1="95" y1="50" x2="95" y2="120" stroke="#fffaf0" stroke-width="2"/>
  <line x1="110" y1="50" x2="110" y2="120" stroke="#fffaf0" stroke-width="2"/>
  <!-- 像素链条肩带 -->
  <rect x="35" y="45" width="6" height="10" fill="#ffd765"/>
  <rect x="35" y="40" width="6" height="6" fill="#ffd765"/>
  <rect x="119" y="45" width="6" height="10" fill="#ffd765"/>
  <rect x="119" y="40" width="6" height="6" fill="#ffd765"/>
</svg>