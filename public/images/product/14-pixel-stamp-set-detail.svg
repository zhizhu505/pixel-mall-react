<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 像素印章套装 - 细节图：单枚印面、印台 -->
  <rect x="35" y="35" width="90" height="90" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="10"/>
  <!-- 印章 -->
  <rect x="50" y="50" width="30" height="25" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="50" y="75" width="30" height="15" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <text x="55" y="87" font-size="10" fill="#3d2f3b">●</text>
  <!-- 第二个印章 -->
  <rect x="85" y="60" width="22" height="18" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="85" y="78" width="22" height="12" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 印台 -->
  <rect x="55" y="100" width="50" height="10" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="2"/>
</svg>