<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 草莓云朵像素包 - 图文介绍图：容量/收纳建议 -->
  <rect x="0" y="0" width="240" height="180" fill="#fff0f5"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">容量收纳建议图</text>
  <!-- 包包主体 -->
  <rect x="60" y="50" width="120" height="90" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="3" rx="8"/>
  <!-- 内部分层示意 -->
  <line x1="60" y1="95" x2="180" y2="95" stroke="#3d2f3b" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="85" y="80" font-size="11" fill="#3d2f3b">主袋</text>
  <text x="85" y="125" font-size="11" fill="#3d2f3b">内袋</text>
  <!-- 可收纳物品示意 -->
  <rect x="15" y="55" width="35" height="25" fill="#fff" stroke="#c0c0c0" stroke-width="1" rx="3"/>
  <text x="18" y="72" font-size="9" fill="#666">手机</text>
  <rect x="15" y="90" width="35" height="20" fill="#fff" stroke="#c0c0c0" stroke-width="1" rx="3"/>
  <text x="18" y="104" font-size="9" fill="#666">钥匙</text>
  <rect x="15" y="120" width="35" height="15" fill="#fff" stroke="#c0c0c0" stroke-width="1" rx="3"/>
  <text x="18" y="132" font-size="9" fill="#666">口红</text>
  <!-- 箭头指示 -->
  <path d="M52 67 L58 67" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M52 100 L58 100" stroke="#666" stroke-width="1.5"/>
  <path d="M52 127 L58 127" stroke="#666" stroke-width="1.5"/>
  <!-- 尺寸标注 -->
  <text x="200" y="75" font-size="10" fill="#666">约20×15cm</text>
  <text x="200" y="95" font-size="10" fill="#666">日常通勤</text>
  <text x="200" y="115" font-size="10" fill="#666">轻松收纳</text>
</svg>