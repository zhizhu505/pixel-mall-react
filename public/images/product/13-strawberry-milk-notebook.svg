<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 草莓牛奶方格便签本 -->
  <!-- 便签本底座 -->
  <rect x="30" y="35" width="100" height="95" fill="#fff0c9" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 封面草莓牛奶图案 -->
  <rect x="35" y="40" width="90" height="60" fill="#ffe2ec"/>
  <!-- 草莓图案 -->
  <circle cx="65" cy="70" r="18" fill="#ff6fa8"/>
  <ellipse cx="62" cy="58" rx="4" ry="3" fill="#7be0c3"/>
  <ellipse cx="68" cy="58" rx="4" ry="3" fill="#7be0c3"/>
  <ellipse cx="65" cy="55" rx="4" ry="3" fill="#7be0c3"/>
  <ellipse cx="71" cy="58" rx="3" ry="2" fill="#7be0c3"/>
  <ellipse cx="59" cy="58" rx="3" ry="2" fill="#7be0c3"/>
  <!-- 牛奶杯 -->
  <rect x="85" y="50" width="25" height="35" fill="#fffaf0" stroke="#3d2f3b" stroke-width="2"/>
  <ellipse cx="97" cy="50" rx="12" ry="5" fill="#fffaf0" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 方格内页效果 -->
  <line x1="40" y1="110" x2="125" y2="110" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="40" y1="120" x2="125" y2="120" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="55" y1="100" x2="55" y2="130" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="75" y1="100" x2="75" y2="130" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="95" y1="100" x2="95" y2="130" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="115" y1="100" x2="115" y2="130" stroke="#ff9fbd" stroke-width="1"/>
</svg>