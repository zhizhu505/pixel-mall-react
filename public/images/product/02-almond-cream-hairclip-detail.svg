<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 杏仁奶油发夹 - 细节图：夹齿、醋酸材质纹理 -->
  <rect x="40" y="60" width="80" height="60" fill="#fff5e6" stroke="#3d2f3b" stroke-width="2" rx="10"/>
  <!-- 发夹主体 -->
  <path d="M50 100 Q80 70 110 100" fill="none" stroke="#ffddc1" stroke-width="8" stroke-linecap="round"/>
  <path d="M50 105 Q80 75 110 105" fill="none" stroke="#ffd4a8" stroke-width="6" stroke-linecap="round"/>
  <!-- 醋酸材质纹理 -->
  <ellipse cx="70" cy="90" rx="8" ry="5" fill="#ffe4c4" opacity="0.6"/>
  <ellipse cx="90" cy="85" rx="6" ry="4" fill="#fff5dc" opacity="0.5"/>
  <!-- 夹齿 -->
  <rect x="55" y="100" width="50" height="3" fill="#c0c0c0"/>
  <path d="M55 103 L55 115 M60 103 L60 118 M65 103 L65 115 M70 103 L70 118 M75 103 L75 115 M80 103 L80 118 M85 103 L85 115 M90 103 L90 118 M95 103 L95 115 M100 103 L100 113" stroke="#808080" stroke-width="2"/>
</svg>