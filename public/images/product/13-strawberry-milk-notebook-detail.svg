<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 草莓牛奶方格便签本 - 细节图：内页方格、纸张厚度 -->
  <rect x="40" y="35" width="80" height="95" fill="#fff" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 封面 -->
  <rect x="40" y="35" width="80" height="95" fill="#fff5f8" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 草莓装饰 -->
  <circle cx="80" cy="60" r="12" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="2"/>
  <ellipse cx="77" cy="53" rx="2" ry="1.5" fill="#7be0c3"/>
  <ellipse cx="83" cy="53" rx="2" ry="1.5" fill="#7be0c3"/>
  <!-- 内页示意 -->
  <line x1="45" y="100" x2="115" y2="100" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="45" y="110" x2="115" y2="110" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="45" y="120" x2="115" y2="120" stroke="#ff9fbd" stroke-width="1"/>
</svg>