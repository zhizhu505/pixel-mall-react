<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 像素印章套装 6枚 -->
  <!-- 猫咪章 -->
  <rect x="20" y="20" width="35" height="35" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="3"/>
  <rect x="28" y="28" width="6" height="6" fill="#3d2f3b"/>
  <rect x="40" y="28" width="6" height="6" fill="#3d2f3b"/>
  <rect x="32" y="38" width="8" height="4" fill="#ffd765"/>
  <!-- 云朵章 -->
  <ellipse cx="70" cy="37" rx="15" ry="12" fill="#8fd7ff" stroke="#3d2f3b" stroke-width="3"/>
  <circle cx="60" cy="40" r="5" fill="#8fd7ff"/>
  <circle cx="80" cy="40" r="5" fill="#8fd7ff"/>
  <!-- 星星章 -->
  <polygon points="115,37 118,47 128,47 120,53 123,63 115,57 107,63 110,53 102,47 112,47" fill="#ffd765" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 月亮章 -->
  <path d="M35 90 Q35 75 50 75 Q65 75 65 90 Q50 90 50 105 Q35 105 35 90" fill="#ffe082" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 草莓章 -->
  <circle cx="100" cy="95" r="15" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="2"/>
  <ellipse cx="97" cy="85" rx="3" ry="2" fill="#7be0c3"/>
  <ellipse cx="103" cy="85" rx="3" ry="2" fill="#7be0c3"/>
  <!-- 像素格章 -->
  <rect x="115" y="75" width="30" height="30" fill="none" stroke="#3d2f3b" stroke-width="3"/>
  <line x1="115" y1="85" x2="145" y2="85" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="115" y1="95" x2="145" y2="95" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="125" y1="75" x2="125" y2="105" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="135" y1="75" x2="135" y2="105" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 玫瑰粉印台 -->
  <rect x="50" y="115" width="60" height="30" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="3"/>
  <rect x="55" y="120" width="50" height="20" fill="#ff6fa8"/>
</svg>