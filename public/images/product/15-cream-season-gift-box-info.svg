<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 奶油季节礼盒 - 图文介绍图：礼盒清单展开图，展示三件商品和贺卡/包装 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffaf0"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">礼盒清单展开图，展示三件商品和贺卡/包装</text>
  <!-- 礼盒展开图 -->
  <rect x="30" y="50" width="180" height="80" fill="#fff5e6" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 丝带 -->
  <path d="M120 50 L120 130" stroke="#ff9fbd" stroke-width="6"/>
  <!-- 商品1：发夹 -->
  <rect x="50" y="65" width="35" height="20" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <path d="M55 75 Q67 65 79 75" fill="none" stroke="#ffddc1" stroke-width="4"/>
  <text x="55" y="95" font-size="8" fill="#666">杏仁奶油发夹</text>
  <!-- 商品2：印章 -->
  <rect x="100" y="65" width="30" height="25" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <circle cx="115" cy="77" r="6" fill="#ff9fbd"/>
  <text x="102" y="95" font-size="8" fill="#666">像素印章套装</text>
  <!-- 商品3：便签本 -->
  <rect x="150" y="65" width="30" height="25" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <circle cx="165" cy="75" r="5" fill="#ff6fa8"/>
  <text x="150" y="95" font-size="8" fill="#666">草莓牛奶便签本</text>
  <!-- 贺卡 -->
  <rect x="70" y="105" width="100" height="20" fill="#fff" stroke="#ff9fbd" stroke-width="1"/>
  <text x="85" y="118" font-size="9" fill="#666">祝福贺卡 + 防尘袋</text>
</svg>