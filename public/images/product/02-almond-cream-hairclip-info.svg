<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 杏仁奶油发夹 - 图文介绍图：夹力/夹齿结构说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffaf0"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">夹力结构说明图</text>
  <!-- 发夹侧面结构图 -->
  <path d="M50 100 Q90 40 130 100" fill="none" stroke="#ffddc1" stroke-width="12" stroke-linecap="round"/>
  <path d="M55 105 Q90 50 125 105" fill="none" stroke="#ffd4a8" stroke-width="8" stroke-linecap="round"/>
  <!-- 弹簧结构示意 -->
  <circle cx="90" cy="85" r="15" fill="none" stroke="#3d2f3b" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="85" y="90" font-size="12" fill="#666">弹簧</text>
  <!-- 夹齿 -->
  <path d="M55 105 L55 140 M62 105 L62 145 M69 105 L69 140 M76 105 L76 145 M83 105 L83 140" stroke="#c0c0c0" stroke-width="3"/>
  <text x="55" y="155" font-size="10" fill="#666">防滑齿设计</text>
  <!-- 不伤发说明 -->
  <rect x="160" y="60" width="70" height="40" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <text x="165" y="75" font-size="10" fill="#666">不伤发设计</text>
  <text x="165" y="90" font-size="10" fill="#666">弧形结构保护发丝</text>
</svg>