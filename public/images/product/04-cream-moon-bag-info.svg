<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 奶油月亮手提包 - 图文介绍图：手提结构、内衬、锁扣三点细节拼图 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffbf5"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">手提结构、内衬、锁扣三点细节图</text>
  <!-- 月牙提手 -->
  <rect x="20" y="45" width="70" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <path d="M30 50 V25 Q30 15 55 15 Q80 15 80 25 V50" fill="none" stroke="#ffddc1" stroke-width="6"/>
  <text x="35" y="110" font-size="10" fill="#666">月牙镂空提手</text>
  <!-- 内衬 -->
  <rect x="95" y="45" width="70" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <rect x="100" y="50" width="60" height="50" fill="#fff5e6"/>
  <line x1="100" y1="55" x2="160" y2="55" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="100" y1="62" x2="160" y2="62" stroke="#ff9fbd" stroke-width="1"/>
  <text x="100" y="110" font-size="10" fill="#666">粉格纹内衬</text>
  <!-- 锁扣 -->
  <rect x="170" y="45" width="70" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <circle cx="200" cy="72" r="12" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="195" y="67" width="10" height="10" fill="#3d2f3b"/>
  <text x="175" y="110" font-size="10" fill="#666">金色像素锁扣</text>
</svg>