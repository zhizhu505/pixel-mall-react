<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 奶油蜡烛小屋摆件 - 细节图：烛芯、房屋纹理 -->
  <rect x="40" y="40" width="80" height="90" fill="#fff5e6" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 屋顶 -->
  <path d="M40 60 L80 25 L120 60 Z" fill="#ffddc1" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 屋身 -->
  <rect x="45" y="60" width="70" height="65" fill="#fff5e6" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 窗户 -->
  <rect x="60" y="80" width="18" height="20" fill="#87ceeb" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="60" y1="90" x2="78" y2="90" stroke="#3d2f3b" stroke-width="1"/>
  <line x1="69" y1="80" x2="69" y2="100" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 门 -->
  <rect x="85" y="95" width="18" height="30" fill="#d4a5a5" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 烛芯 -->
  <line x1="80" y1="60" x2="80" y2="45" stroke="#3d2f3b" stroke-width="2"/>
  <circle cx="80" cy="42" r="3" fill="#ffd700"/>
</svg>