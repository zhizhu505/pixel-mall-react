<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 星沙像素耳夹套装 - 图文介绍图：无耳洞佩戴结构和夹扣舒适度说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffaf0"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">无耳洞佩戴结构和夹扣舒适度说明</text>
  <!-- 耳夹结构放大图 -->
  <path d="M80 60 L90 80 L70 80 Z" fill="#ffd700" stroke="#3d2f3b" stroke-width="3"/>
  <rect x="75" y="80" width="10" height="25" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <circle cx="80" cy="90" r="6" fill="none" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="76" y1="80" x2="76" y2="105" stroke="#ffd700" stroke-width="3"/>
  <!-- 说明文字 -->
  <rect x="130" y="50" width="100" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <text x="140" y="68" font-size="10" fill="#666">弹簧按压设计</text>
  <text x="140" y="83" font-size="10" fill="#666">佩戴舒适不夹耳</text>
  <text x="140" y="98" font-size="10" fill="#666">适合无耳洞人群</text>
</svg>