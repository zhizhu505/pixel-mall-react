<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 金色糖霜小镜 - 图文介绍图：打开角度+镜面尺寸说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffef5"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">打开角度 + 镜面尺寸说明图</text>
  <!-- 镜子打开状态 -->
  <rect x="30" y="60" width="80" height="80" fill="#fff" stroke="#ffd700" stroke-width="4" rx="6"/>
  <rect x="40" y="70" width="60" height="60" fill="#e8f4f8" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 尺寸标注 -->
  <line x1="30" y1="50" x2="110" y2="50" stroke="#3d2f3b" stroke-width="1"/>
  <line x1="30" y1="47" x2="30" y2="53" stroke="#3d2f3b" stroke-width="1"/>
  <line x1="110" y1="47" x2="110" y2="53" stroke="#3d2f3b" stroke-width="1"/>
  <text x="65" y="42" font-size="10" fill="#666">80mm</text>
  <line x1="20" y1="60" x2="20" y2="140" stroke="#3d2f3b" stroke-width="1"/>
  <line x1="17" y1="60" x2="23" y2="60" stroke="#3d2f3b" stroke-width="1"/>
  <line x1="17" y1="140" x2="23" y2="140" stroke="#3d2f3b" stroke-width="1"/>
  <text x="5" y="100" font-size="10" fill="#666">80mm</text>
  <!-- 打开角度 -->
  <path d="M110 100 L140 60 L140 100" fill="none" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <text x="125" y="85" font-size="10" fill="#666">180°</text>
</svg>