<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 柠檬像素双肩包 - 图文介绍图：15L分层容量说明，含13寸电脑位 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffef0"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">15L 分层容量说明，含 13 寸电脑位</text>
  <!-- 书包侧视图 -->
  <rect x="60" y="40" width="50" height="100" fill="#fffacd" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 分层示意 -->
  <line x1="60" y1="70" x2="110" y2="70" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="60" y1="95" x2="110" y2="95" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 电脑位 -->
  <rect x="65" y="45" width="40" height="22" fill="#e8e8e8" stroke="#3d2f3b" stroke-width="1"/>
  <text x="70" y="58" font-size="8" fill="#666">13" 电脑</text>
  <!-- 小物件层 -->
  <rect x="65" y="75" width="40" height="17" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <text x="70" y="87" font-size="8" fill="#666">小物件</text>
  <!-- 主仓 -->
  <rect x="65" y="100" width="40" height="35" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <text x="70" y="120" font-size="8" fill="#666">主仓 15L</text>
</svg>