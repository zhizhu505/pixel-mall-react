<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 柠檬黄双肩包主体 -->
  <rect x="30" y="45" width="100" height="85" rx="5" fill="#ffd765" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 背包上方口袋 -->
  <rect x="45" y="55" width="70" height="30" fill="#fffaf0" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 像素柠檬装饰 -->
  <ellipse cx="80" cy="100" rx="20" ry="18" fill="#ffe082"/>
  <ellipse cx="75" cy="95" rx="5" ry="4" fill="#7be0c3"/>
  <ellipse cx="85" cy="95" rx="5" ry="4" fill="#7be0c3"/>
  <ellipse cx="80" cy="92" rx="4" ry="3" fill="#7be0c3"/>
  <!-- 肩带 -->
  <rect x="25" y="50" width="10" height="40" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="125" y="50" width="10" height="40" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 背包拉链 -->
  <line x1="50" y1="115" x2="110" y2="115" stroke="#3d2f3b" stroke-width="4"/>
  <rect x="75" y="112" width="10" height="6" fill="#8fd7ff"/>
</svg>