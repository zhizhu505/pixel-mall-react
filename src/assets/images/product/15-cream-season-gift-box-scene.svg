<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 奶油季节礼盒 - 场景图：包装绑带/送礼场景 -->
  <rect x="0" y="110" width="160" height="50" fill="#f5f5dc"/>
  <!-- 礼盒 -->
  <rect x="50" y="60" width="60" height="40" fill="#fff5e6" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 丝带 -->
  <path d="M80 60 L80 100" stroke="#ff9fbd" stroke-width="6"/>
  <path d="M50 80 L110 80" stroke="#ff9fbd" stroke-width="6"/>
  <!-- 蝴蝶结 -->
  <circle cx="80" cy="80" r="6" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 礼物标签 -->
  <rect x="105" y="70" width="15" height="20" fill="#fff" stroke="#ff9fbd" stroke-width="1"/>
</svg>