<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 像素印章套装 - 图文介绍图：6枚图案+双色印台+盖印效果说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fffef5"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">6枚图案 + 双色印台 + 盖印效果说明</text>
  <!-- 印章展示 -->
  <rect x="30" y="50" width="25" height="20" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <text x="38" y="65" font-size="10" fill="#3d2f3b">●</text>
  <rect x="60" y="50" width="25" height="20" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <text x="68" y="65" font-size="10" fill="#3d2f3b">▲</text>
  <rect x="90" y="50" width="25" height="20" fill="#7be0c3" stroke="#3d2f3b" stroke-width="2"/>
  <text x="98" y="65" font-size="10" fill="#3d2f3b">★</text>
  <rect x="30" y="80" width="25" height="20" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <text x="38" y="95" font-size="10" fill="#3d2f3b">♥</text>
  <rect x="60" y="80" width="25" height="20" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <text x="68" y="95" font-size="10" fill="#3d2f3b">◆</text>
  <rect x="90" y="80" width="25" height="20" fill="#7be0c3" stroke="#3d2f3b" stroke-width="2"/>
  <text x="98" y="95" font-size="10" fill="#3d2f3b">■</text>
  <!-- 印台和效果 -->
  <rect x="140" y="50" width="80" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <rect x="150" y="60" width="60" height="15" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="1"/>
  <rect x="150" y="80" width="60" height="15" fill="#ffd700" stroke="#3d2f3b" stroke-width="1"/>
  <text x="155" y="105" font-size="9" fill="#666">粉色 + 金色双色印台</text>
</svg>