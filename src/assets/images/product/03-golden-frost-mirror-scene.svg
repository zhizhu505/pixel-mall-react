<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 金色糖霜小镜 - 场景图：手持补妆/桌面随身场景 -->
  <rect x="0" y="110" width="160" height="50" fill="#f5f5f5"/>
  <!-- 桌面物品 -->
  <rect x="20" y="90" width="30" height="25" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <circle cx="35" cy="98" r="5" fill="#ff6fa8"/>
  <!-- 镜子 -->
  <rect x="60" y="50" width="40" height="40" fill="#fff" stroke="#ffd700" stroke-width="3" rx="4"/>
  <rect x="65" y="55" width="30" height="30" fill="#e8f4f8" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 手 -->
  <ellipse cx="80" cy="105" rx="25" ry="15" fill="#ffe4e1" stroke="#3d2f3b" stroke-width="2"/>
  <path d="M55 105 L50 90 M65 102 L62 88 M75 100 L75 85" stroke="#ffe4e1" stroke-width="8" stroke-linecap="round"/>
</svg>