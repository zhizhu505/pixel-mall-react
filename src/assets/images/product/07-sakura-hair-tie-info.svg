<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 樱花像素发圈 - 图文介绍图：三件组颜色和弹力材质说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fff5f8"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">三件组颜色和弹力材质说明图</text>
  <!-- 三件发圈 -->
  <circle cx="80" cy="70" r="25" fill="none" stroke="#ff9fbd" stroke-width="12"/>
  <circle cx="120" cy="70" r="22" fill="none" stroke="#fff" stroke-width="12" stroke="#3d2f3b"/>
  <circle cx="160" cy="70" r="19" fill="none" stroke="#ffc0cb" stroke-width="12"/>
  <!-- 颜色标注 -->
  <text x="75" y="105" font-size="10" fill="#666">樱花粉</text>
  <text x="115" y="105" font-size="10" fill="#666">奶油白</text>
  <text x="155" y="105" font-size="10" fill="#666">浅粉</text>
  <!-- 材质说明 -->
  <rect x="60" y="125" width="120" height="40" fill="#fff" stroke="#3d2f3b" stroke-width="2" rx="5"/>
  <text x="75" y="142" font-size="10" fill="#666">高弹力尼龙材质</text>
  <text x="80" y="158" font-size="10" fill="#666">不易变形，不伤发</text>
</svg>