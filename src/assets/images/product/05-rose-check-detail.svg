<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 玫瑰格纹斜挎小包 - 细节图：格纹布料、肩带链条 -->
  <rect x="35" y="50" width="90" height="60" fill="#fff" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 格纹图案 -->
  <rect x="40" y="55" width="80" height="50" fill="#fff5f8"/>
  <line x1="40" y1="60" x2="120" y2="60" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="40" y1="72" x2="120" y2="72" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="40" y1="84" x2="120" y2="84" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="40" y1="96" x2="120" y2="96" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="56" y1="55" x2="56" y2="105" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="72" y1="55" x2="72" y2="105" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="88" y1="55" x2="88" y2="105" stroke="#ff9fbd" stroke-width="2"/>
  <line x1="104" y1="55" x2="104" y2="105" stroke="#ff9fbd" stroke-width="2"/>
  <!-- 链条 -->
  <circle cx="45" cy="58" r="4" fill="#ffd700" stroke="#3d2f3b" stroke-width="1"/>
  <circle cx="35" cy="48" r="4" fill="#ffd700" stroke="#3d2f3b" stroke-width="1"/>
</svg>