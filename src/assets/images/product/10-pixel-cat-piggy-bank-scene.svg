  <!-- 存钱罐 -->
  <rect x="60" y="60" width="40" height="35" fill="#ffc0cb" stroke="#3d2f3b" stroke-width="3" rx="5"/>
  <circle cx="80" cy="72" r="10" fill="#ffc0cb" stroke="#3d2f3b" stroke-width="2"/>
  <circle cx="76" cy="70" r="2" fill="#3d2f3b"/>
  <circle cx="84" cy="70" r="2" fill="#3d2f3b"/>
  <!-- 零钱 -->
  <circle cx="30" y="100" r="8" fill="#ffd700" stroke="#3d2f3b" stroke-width="1"/>
  <circle cx="45" y="95" r="6" fill="#c0c0c0" stroke="#3d2f3b" stroke-width="1"/>
  <circle cx="120" y="102" r="7" fill="#ffd700" stroke="#3d2f3b" stroke-width="1"/>
</svg>