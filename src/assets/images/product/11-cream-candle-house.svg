<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 奶油蜡烛小屋摆件 -->
  <!-- 房屋主体 -->
  <rect x="40" y="60" width="80" height="70" fill="#fffaf0" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 屋顶 -->
  <polygon points="35,60 80,20 125,60" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 烟囱 -->
  <rect x="95" y="25" width="15" height="25" fill="#ffe2ec" stroke="#3d2f3b" stroke-width="3"/>
  <!-- 蜡烛火焰 -->
  <ellipse cx="80" cy="85" rx="10" ry="15" fill="#ffd765"/>
  <ellipse cx="80" cy="82" rx="5" ry="8" fill="#ff9fbd"/>
  <!-- 门窗 -->
  <rect x="55" y="95" width="20" height="30" fill="#ffe2ec" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="85" y="95" width="20" height="30" fill="#ffe2ec" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 小窗 -->
  <rect x="70" y="70" width="20" height="15" fill="#8fd7ff" stroke="#3d2f3b" stroke-width="2"/>
</svg>