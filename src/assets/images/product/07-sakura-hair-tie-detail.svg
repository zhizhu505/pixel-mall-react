<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 樱花像素发圈 - 细节图：三色组合、弹力圈细节 -->
  <rect x="30" y="30" width="100" height="100" fill="#fff5f8" stroke="#3d2f3b" stroke-width="2" rx="10"/>
  <!-- 粉色发圈 -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="#ff9fbd" stroke-width="10"/>
  <!-- 白色发圈 -->
  <circle cx="90" cy="70" r="18" fill="none" stroke="#fff" stroke-width="10" stroke="#3d2f3b"/>
  <!-- 浅粉发圈 -->
  <circle cx="75" cy="90" r="16" fill="none" stroke="#ffc0cb" stroke-width="10"/>
  <!-- 樱花装饰 -->
  <circle cx="60" cy="60" r="5" fill="#ffb6c1"/>
</svg>