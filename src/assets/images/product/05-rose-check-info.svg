<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 玫瑰格纹斜挎小包 - 图文介绍图：肩带可拆卸/可调节说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fff5f8"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">肩带可拆卸/可调节说明图</text>
  <!-- 包包主体 -->
  <rect x="70" y="80" width="100" height="60" fill="#fff5f8" stroke="#3d2f3b" stroke-width="2"/>
  <line x1="75" y1="85" x2="165" y2="85" stroke="#ff9fbd" stroke-width="1"/>
  <line x1="75" y1="95" x2="165" y2="95" stroke="#ff9fbd" stroke-width="1"/>
  <!-- 链条肩带 -->
  <path d="M70 85 Q40 30 20 35" fill="none" stroke="#ffd700" stroke-width="4"/>
  <path d="M170 85 Q200 30 220 35" fill="none" stroke="#ffd700" stroke-width="4"/>
  <!-- 调节扣 -->
  <circle cx="50" cy="45" r="8" fill="#fff" stroke="#ffd700" stroke-width="2"/>
  <circle cx="50" cy="45" r="4" fill="#ffd700"/>
  <!-- 说明文字 -->
  <rect x="20" y="150" width="80" height="25" fill="#fff" stroke="#3d2f3b" stroke-width="1" rx="3"/>
  <text x="25" y="168" font-size="10" fill="#666">链条可拆卸</text>
  <rect x="140" y="150" width="80" height="25" fill="#fff" stroke="#3d2f3b" stroke-width="1" rx="3"/>
  <text x="145" y="168" font-size="10" fill="#666">长度可调节</text>
</svg>