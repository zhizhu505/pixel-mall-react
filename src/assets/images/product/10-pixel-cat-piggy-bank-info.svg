<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- 像素猫咪存钱罐 - 图文介绍图：投币口、容量、底部取币口说明 -->
  <rect x="0" y="0" width="240" height="180" fill="#fff5f5"/>
  <text x="20" y="25" font-size="14" font-weight="bold" fill="#3d2f3b">投币口、容量、底部取币口说明</text>
  <!-- 存钱罐侧视图 -->
  <rect x="60" y="50" width="50" height="60" fill="#ffc0cb" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 投币口 -->
  <rect x="65" y="45" width="40" height="5" fill="#3d2f3b"/>
  <text x="70" y="40" font-size="8" fill="#666">投币口</text>
  <!-- 容量示意 -->
  <rect x="65" y="60" width="40" height="40" fill="#fff" stroke="#3d2f3b" stroke-width="1"/>
  <text x="75" y="82" font-size="8" fill="#666">可存约 500 枚</text>
  <text x="75" y="92" font-size="8" fill="#666">1 元硬币</text>
  <!-- 底部取币口 -->
  <circle cx="85" cy="115" r="6" fill="#8b7355" stroke="#3d2f3b" stroke-width="1"/>
  <text x="75" y="125" font-size="8" fill="#666">旋转取币塞</text>
</svg>