<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 草莓云朵像素包 - 细节图：前袋绣片、拉链、肩带五金 -->
  <rect x="30" y="40" width="100" height="80" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="4"/>
  <!-- 拉链细节 -->
  <rect x="75" y="40" width="6" height="80" fill="#c0c0c0"/>
  <rect x="73" y="42" width="10" height="4" fill="#808080"/>
  <!-- 云朵绣片 -->
  <ellipse cx="55" cy="65" rx="12" ry="8" fill="#fffaf0" stroke="#3d2f3b" stroke-width="2"/>
  <ellipse cx="70" cy="60" rx="10" ry="6" fill="#fffaf0" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 草莓绣片 -->
  <circle cx="100" cy="75" r="10" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="2"/>
  <ellipse cx="97" cy="68" rx="2" ry="1.5" fill="#7be0c3"/>
  <ellipse cx="103" cy="68" rx="2" ry="1.5" fill="#7be0c3"/>
  <ellipse cx="100" cy="65" rx="2" ry="1.5" fill="#7be0c3"/>
  <!-- 肩带五金扣 -->
  <rect x="30" y="50" width="8" height="16" fill="#ffd700" stroke="#3d2f3b" stroke-width="2"/>
  <circle cx="34" cy="58" r="3" fill="#3d2f3b"/>
</svg>