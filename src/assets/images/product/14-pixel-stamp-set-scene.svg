<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- 像素印章套装 - 场景图：盖印效果/手账场景 -->
  <rect x="0" y="0" width="160" height="160" fill="#fffef5"/>
  <!-- 手账本 -->
  <rect x="20" y="40" width="120" height="90" fill="#fff" stroke="#3d2f3b" stroke-width="2"/>
  <!-- 印章和印台 -->
  <rect x="50" y="30" width="20" height="15" fill="#ff9fbd" stroke="#3d2f3b" stroke-width="2"/>
  <rect x="80" y="30" width="35" height="8" fill="#ff6fa8" stroke="#3d2f3b" stroke-width="1"/>
  <!-- 盖印效果 -->
  <circle cx="40" cy="60" r="6" fill="#ff9fbd"/>
  <circle cx="70" cy="65" r="5" fill="#ffd700"/>
  <text x="40" y="85" font-size="10" fill="#666">像素印章效果</text>
</svg>